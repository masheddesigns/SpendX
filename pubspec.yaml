name: spend_x
description: "A new Flutter project."
publish_to: 'none'
version: 1.3.20+20

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  fl_chart: ^1.1.1
  shared_preferences: ^2.5.4
  uuid: ^4.5.3
  intl: ^0.20.2
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  csv: ^7.2.0
  google_generative_ai: ^0.4.7
  file_picker: ^10.3.10
  image_picker: ^1.2.1
  flutter_local_notifications: ^21.0.0
  permission_handler: ^12.0.1
  http: ^1.6.0
  provider: ^6.1.5+1
  flutter_dotenv: ^6.0.0
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0
  flutter_secure_storage: ^10.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.1
  package_info_plus: ^9.0.0
  path: ^1.9.1
  url_launcher: ^6.3.2
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.svg"
  min_sdk_android: 21
  adaptive_icon_background: "#0B1220"
  adaptive_icon_foreground: "assets/logo.svg"
  adaptive_icon_monochrome: "assets/logo.svg"
  adaptive_icon_foreground_padding: 16

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/logo.svg
